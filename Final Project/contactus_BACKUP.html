
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script type="text/javascript" src="contactus.js" defer></script>
  <style>
     * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: flex-start;
      flex-direction: column;
      min-height: 100vh;
      background: url(https://cdn.cundall.com/uploads/images/Projects/01-AI-Generated/_large_image/412849/Cinepolis-Cinemas-01.webp?v=1705052337) no-repeat;
      background-size: cover;
      background-position: center;
    }
    .navbar {
      background-color: #1c1c1c;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
    }

    .navbar .navbar-brand, .navbar-nav .nav-link {
      color: #fff !important;
    }

    .navbar .navbar-nav .nav-link:hover {
      color: #ff6347 !important;
    }

    .navbar-toggler-icon {
      background-color: #fff;
    }

    .message-area {
      width: 420px;
      background: transparent transparent transparent transparent;
      border: 2px solid rgba(1, 2, 20, 0.2);
      backdrop-filter: blur(20px);
      color: #fff;
      border-radius: 12px;
      padding: 30px 40px;
      margin-top: 80px;
    }

    .message-area h1 {
      font-size: 36px;
      text-align: center;
    }

    .message-area .input-box {
      position: relative;
      width: 100%;
      height: 50px;
      margin: 30px 0;
    }

    .input-box input {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      border: 2px solid rgba(255, 255, 255, .2);
      border-radius: 40px;
      font-size: 16px;
      color: #fff;
      padding: 20px 45px 20px 20px;
    }

    .input-box input::placeholder {
      color: #fff;
    }

    .input-box i {
      position: absolute;
      right: 20px;
      top: 30%;
      transform: translate(-50%);
      font-size: 20px;
    }
    .message-area .text-area {
      position: relative;
      width: 100%;
      height: 150px;
      margin: 30px 0;
    }

    .text-area textarea {
      width: 100%;
      height: 100%;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, .2);
      border-radius: 12px;
      font-size: 16px;
      color: #fff;
      padding: 15px;
      resize: none;
    }

    .text-area textarea::placeholder {
      color: #fff;
    }

    .message-area .btn {
      width: 100%;
      height: 45px;
      background: #fff;
      border: none;
      outline: none;
      border-radius: 40px;
      box-shadow: 0 0 10px rgba(0, 0, 0, .1);
      cursor: pointer;
      font-size: 16px;
      color: #333;
      font-weight: 600;
    }
    .btn:hover{
      background-color: #ff6347;
      color: #fff;
    }
    footer {
      background-color: #1c1c1c;
      color: #fff;
      padding: 20px 0;
      text-align: center;
      margin-top: auto;
    }

  </style>
</head>
<body>


    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">FSC Theater</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Schedule.html">Schedule</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="aboutus.html">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="contactus.html">Contact Us</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="Login_Page.html">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Login_Page.html">Sign Up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Message Area -->
    <div class="d-flex justify-content-center align-items-center min-vh-100">
      <div class="message-area">
          <form action="">
              <h1>Message Us</h1>
              <div class="input-box">
                  <input type="text" placeholder="Name">    
              </div>
              <div class="input-box">
                  <input type="tel" placeholder="Phone Number">    
              </div>
              <div class="input-box">
                  <input type="email" placeholder="Email">
              </div>
              <div class="text-area">
                  <textarea class="message" placeholder="Your Message" rows="15"></textarea>
              </div>
              <button type="submit" class="btn">Submit</button>
          </form>
      </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 FSC Theater. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>

</body>
</html>
