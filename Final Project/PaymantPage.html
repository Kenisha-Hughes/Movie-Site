<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="Payment.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">FSC Theater</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Schedule.html">Schedule</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="aboutus.html">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contactus.html">Contact Us</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-4 text-light">Book Your Ticket</h2>
        <div class="card mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <h5 class="card-title text-center text-light">Movie Ticket Booking</h5>
                <form id="booking-form" method="POST" onsubmit="return showConfirmation(event)">
                    <!-- Movie Selection Dropdown -->
                    <div class="mb-3">
                        <label for="movieTitle" class="form-label text-light">Select Movie</label>
                        <select id="movieTitle" name="movieTitle" class="form-select" required>
                            <option value="" disabled selected>Select a Movie</option>
                            <option value="Gladiator II">Gladiator II</option>
                            <option value="Wicked">Wicked</option>
                            <option value="Get Fast">Get Fast</option>
                            <option value="Red One">Red One</option>
                            <option value="Venom: The Last Dance">Venom: The Last Dance</option>
                            <option value="Moana 2">Moana 2</option>
                            <option value="Armor">Armor</option>
                            <option value="ELF">ELF</option>
                        </select>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="userName" class="form-label text-light">Your Name</label>
                            <input type="text" id="userName" name="userName" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="userEmail" class="form-label text-light">Your Email</label>
                            <input type="email" id="userEmail" name="userEmail" class="form-control" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="seatType" class="form-label text-light">Select Seat Type</label>
                            <select id="seatType" name="seatType" class="form-select" required>
                                <option value="" disabled selected>Select Seat Type</option>
                                <option value="regular">Regular Seat - $3200</option>
                                <option value="vip">VIP Seat - $4500</option>
                                <option value="deluxe">Daybed - $10,000</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="ticketQuantity" class="form-label text-light">Number of Tickets</label>
                            <input type="number" id="ticketQuantity" name="ticketQuantity" class="form-control" value="1" min="1" max="10" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="cardNumber" class="form-label text-light">Card Number</label>
                        <input type="text" id="cardNumber" name="cardNumber" class="form-control" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="cardExpiry" class="form-label text-light">Expiration Date</label>
                            <input type="text" id="cardExpiry" name="cardExpiry" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label for="cardCVC" class="form-label text-light">CVC</label>
                            <input type="text" id="cardCVC" name="cardCVC" class="form-control" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning btn-lg w-100 mt-3">Book Now</button>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmationModal" tabindex="-1" aria-labelledby="confirmationModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmationModalLabel">Booking Confirmed</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Please check your email, your ticket has been sent!</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="reloadButton">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2024 FSC Theater. All Rights Reserved.</p>
    </div>>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showConfirmation(event) {
            event.preventDefault();
        
            const ticketQuantity = document.getElementById('ticketQuantity').value;

            
            if (ticketQuantity > 10) {
                alert("You cannot book more than 10 tickets.");
                return false; 
            }
            const confirmationModal = new bootstrap.Modal(document.getElementById('confirmationModal'));
            confirmationModal.show();

            return false;
        }
        document.getElementById('reloadButton').addEventListener('click', function() {
            window.location.reload(); 
        });
    </script>
</body>
</html>
